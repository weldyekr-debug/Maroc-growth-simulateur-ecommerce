* HTML 



<div class="container">

&nbsp; <h1>Growth Strategy Simulator 📈</h1>

&nbsp; <p>Simulez l'impact de différentes stratégies de croissance digitale.</p>



&nbsp; <label>Budget publicitaire (MAD)</label>

&nbsp; <input type="number" id="budget" placeholder="Ex: 10000">



&nbsp; <label>CPC - Coût par clic (MAD)</label>

&nbsp; <input type="number" id="cpc" placeholder="Ex: 2">



&nbsp; <label>Taux de conversion (%)</label>

&nbsp; <input type="number" id="conversion" placeholder="Ex: 3">



&nbsp; <label>Panier moyen (MAD)</label>

&nbsp; <input type="number" id="panier" placeholder="Ex: 400">



&nbsp; <label>Taux de rétention (%)</label>

&nbsp; <input type="number" id="retention" placeholder="Ex: 20">



&nbsp; <button onclick="simuler()">Lancer la simulation 🚀</button>



&nbsp; <div id="resultats"></div>

</div>
